<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>vulkan</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #000;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <!-- tabindex makes the canvas focusable at all — without it, clicking
         the canvas never focuses the document, and requestPointerLock()
         (called on click, see app.rs) requires document focus to succeed. -->
    <canvas id="canvas" tabindex="0"></canvas>
    <script type="module">
      import init from "./pkg/vulkan.js";
      init();
    </script>
  </body>
</html>
